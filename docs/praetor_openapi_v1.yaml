openapi: 3.0.3
info:
  title: Praetor REST API
  version: v1
  description: Kubernetes-native Ansible automation platform.
servers:
  - url: /api/v1
paths:
  /ping:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: pong
  /organizations:
    get:
      summary: List organizations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      summary: Create organization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationInput'
      responses:
        '201':
          description: Created
  /bulk/jobs/launch:
    post:
      summary: Launch a bounded batch of job templates
      description: |
        Processes 1-25 launches in input order. Each item passes through the
        same template, inventory, prompt, survey, limit, and concurrency checks
        as POST /jobs. The Idempotency-Key is scoped to the authenticated human
        user; replaying the same request returns the stored response, while
        reusing the key with a different body returns 409.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkJobLaunchRequest'
      responses:
        '201':
          description: Every launch was accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkJobLaunchResponse'
        '207':
          description: The bounded batch completed with one or more rejected items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkJobLaunchResponse'
        '400':
          description: Invalid request shape, item count, or idempotency key
        '409':
          description: Idempotency key was already used with a different request
        '413':
          description: Request body exceeds 256 KiB
  /bulk/hosts/create:
    post:
      summary: Create a bounded batch of inventory hosts
      description: |
        Processes 1-100 hosts in input order. Each item passes through the same
        inventory-admin authorization, field handling, uniqueness constraint,
        and activity recording as POST /inventories/{inventoryId}/hosts. The
        Idempotency-Key is scoped to the authenticated human user; replaying
        the same request returns the stored response, while reusing the key
        with a different body returns 409.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkHostCreateRequest'
      responses:
        '201':
          description: Every host was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkHostCreateResponse'
        '207':
          description: The bounded batch completed with one or more rejected items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkHostCreateResponse'
        '400':
          description: Invalid request shape, item count, or idempotency key
        '409':
          description: Idempotency key was already used with a different request
        '413':
          description: Request body exceeds 512 KiB
  /bulk/hosts/delete/preview:
    post:
      summary: Preview a bounded batch of host deletions
      description: |
        Resolves and authorizes 1-100 hosts, reports records that deletion will
        remove or detach, and identifies blocking runner or delegated-launch
        relationships. Missing and unauthorized hosts are indistinguishable.
        The returned opaque confirmation token is user-bound and valid for five
        minutes; only its SHA-256 digest is persisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkHostDeletePreviewRequest'
      responses:
        '201':
          description: Authorization-filtered destructive impact preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkHostDeletePreviewResponse'
        '400':
          description: Invalid request shape, duplicate host ID, or item count
        '413':
          description: Request body exceeds 128 KiB
  /bulk/hosts/delete:
    post:
      summary: Confirm a previewed batch of host deletions
      description: |
        Consumes an unexpired preview token. Ready items are re-resolved,
        re-authorized, and checked against the previewed host and relationship
        state before the canonical host deletion path runs. Results are
        durable and resumable under the authenticated user's Idempotency-Key.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkHostDeleteConfirmRequest'
      responses:
        '200':
          description: Every preview-ready host was deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkHostDeleteResponse'
        '207':
          description: The batch completed with blocked, stale, or rejected items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkHostDeleteResponse'
        '400':
          description: Invalid confirmation token or idempotency key
        '409':
          description: Preview expired, was consumed, or idempotency key conflicts
        '413':
          description: Request body exceeds 128 KiB

components:
  schemas:
    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    OrganizationInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
    BulkJobLaunchRequest:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 25
          items:
            $ref: '#/components/schemas/BulkJobLaunchItem'
    BulkJobLaunchItem:
      type: object
      required: [unified_job_template_id]
      additionalProperties: false
      properties:
        identifier:
          type: string
          maxLength: 64
          description: Optional client correlation label echoed in the result.
        unified_job_template_id:
          type: integer
          format: int64
          minimum: 1
        name:
          type: string
        extra_vars:
          type: object
          additionalProperties: true
        limit:
          type: string
          nullable: true
        relaunch_source_job_id:
          type: integer
          format: int64
          nullable: true
    BulkJobLaunchResponse:
      type: object
      required: [idempotency_key, complete, results]
      properties:
        idempotency_key:
          type: string
        complete:
          type: boolean
          enum: [true]
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkJobLaunchResult'
    BulkJobLaunchResult:
      type: object
      required: [index, status, http_status]
      properties:
        index:
          type: integer
          minimum: 0
        identifier:
          type: string
        status:
          type: string
          enum: [accepted, rejected]
        http_status:
          type: integer
        job_id:
          type: integer
          format: int64
        code:
          type: string
          enum: [not_found_or_forbidden, invalid_request, conflict, internal_error]
        error:
          type: string
    BulkHostCreateRequest:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/BulkHostCreateItem'
    BulkHostCreateItem:
      type: object
      required: [inventory_id, name]
      additionalProperties: false
      properties:
        identifier:
          type: string
          maxLength: 64
          description: Optional client correlation label echoed in the result.
        inventory_id:
          type: integer
          format: int64
          minimum: 1
        name:
          type: string
        description:
          type: string
          nullable: true
        variables:
          type: object
          additionalProperties: true
        is_control_node:
          type: boolean
          default: false
    BulkHostCreateResponse:
      type: object
      required: [idempotency_key, complete, results]
      properties:
        idempotency_key:
          type: string
        complete:
          type: boolean
          enum: [true]
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkHostCreateResult'
    BulkHostCreateResult:
      type: object
      required: [index, status, http_status]
      properties:
        index:
          type: integer
          minimum: 0
        identifier:
          type: string
        status:
          type: string
          enum: [created, rejected]
        http_status:
          type: integer
        host_id:
          type: integer
          format: int64
        code:
          type: string
          enum: [not_found_or_forbidden, invalid_request, duplicate, internal_error]
        error:
          type: string
    BulkHostDeletePreviewRequest:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items:
            $ref: '#/components/schemas/BulkHostDeleteItem'
    BulkHostDeleteItem:
      type: object
      required: [host_id]
      additionalProperties: false
      properties:
        identifier:
          type: string
          maxLength: 64
        host_id:
          type: integer
          format: int64
          minimum: 1
    BulkHostDeletePreviewResponse:
      type: object
      required: [confirmation_token, expires_at, results]
      properties:
        confirmation_token:
          type: string
        expires_at:
          type: string
          format: date-time
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkHostDeletePreviewResult'
    BulkHostDeletePreviewResult:
      type: object
      required: [index, status, http_status, blocking_relationships, affected_relationships]
      properties:
        index:
          type: integer
          minimum: 0
        identifier:
          type: string
        status:
          type: string
          enum: [ready, blocked, rejected]
        http_status:
          type: integer
        host_id:
          type: integer
          format: int64
        name:
          type: string
        inventory_id:
          type: integer
          format: int64
        blocking_relationships:
          type: array
          items:
            $ref: '#/components/schemas/BulkHostDeleteRelationship'
        affected_relationships:
          type: array
          items:
            $ref: '#/components/schemas/BulkHostDeleteEffect'
        code:
          type: string
          enum: [not_found_or_forbidden, blocking_relationships]
        error:
          type: string
    BulkHostDeleteRelationship:
      type: object
      required: [code, count]
      properties:
        code:
          type: string
          enum: [inventory_runner, delegated_launch_grant]
        count:
          type: integer
          minimum: 1
    BulkHostDeleteEffect:
      type: object
      required: [code, count, effect]
      properties:
        code:
          type: string
          enum: [fact_cache, group_membership, job_host_summary, job_event_host_reference, execution_runner_reference]
        count:
          type: integer
          minimum: 1
        effect:
          type: string
          enum: [delete, detach]
    BulkHostDeleteConfirmRequest:
      type: object
      required: [confirmation_token]
      additionalProperties: false
      properties:
        confirmation_token:
          type: string
    BulkHostDeleteResponse:
      type: object
      required: [idempotency_key, complete, results]
      properties:
        idempotency_key:
          type: string
        complete:
          type: boolean
          enum: [true]
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkHostDeleteResult'
    BulkHostDeleteResult:
      type: object
      required: [index, status, http_status]
      properties:
        index:
          type: integer
          minimum: 0
        identifier:
          type: string
        status:
          type: string
          enum: [deleted, rejected]
        http_status:
          type: integer
        host_id:
          type: integer
          format: int64
        code:
          type: string
          enum: [not_found_or_forbidden, blocking_relationships, stale_preview, already_deleted]
        error:
          type: string
