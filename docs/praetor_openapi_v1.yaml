openapi: 3.0.3
info:
  title: Praetor REST API
  version: v1
  description: Kubernetes-native Ansible automation platform.
servers:
  - url: /api/v1
paths:
  /ping:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: pong
  /organizations:
    get:
      summary: List organizations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      summary: Create organization
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationInput'
      responses:
        '201':
          description: Created
  /bulk/jobs/launch:
    post:
      summary: Launch a bounded batch of job templates
      description: |
        Processes 1-25 launches in input order. Each item passes through the
        same template, inventory, prompt, survey, limit, and concurrency checks
        as POST /jobs. The Idempotency-Key is scoped to the authenticated human
        user; replaying the same request returns the stored response, while
        reusing the key with a different body returns 409.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: '^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkJobLaunchRequest'
      responses:
        '201':
          description: Every launch was accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkJobLaunchResponse'
        '207':
          description: The bounded batch completed with one or more rejected items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkJobLaunchResponse'
        '400':
          description: Invalid request shape, item count, or idempotency key
        '409':
          description: Idempotency key was already used with a different request
        '413':
          description: Request body exceeds 256 KiB

components:
  schemas:
    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    OrganizationInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
    BulkJobLaunchRequest:
      type: object
      required: [items]
      additionalProperties: false
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 25
          items:
            $ref: '#/components/schemas/BulkJobLaunchItem'
    BulkJobLaunchItem:
      type: object
      required: [unified_job_template_id]
      additionalProperties: false
      properties:
        identifier:
          type: string
          maxLength: 64
          description: Optional client correlation label echoed in the result.
        unified_job_template_id:
          type: integer
          format: int64
          minimum: 1
        name:
          type: string
        extra_vars:
          type: object
          additionalProperties: true
        limit:
          type: string
          nullable: true
        relaunch_source_job_id:
          type: integer
          format: int64
          nullable: true
    BulkJobLaunchResponse:
      type: object
      required: [idempotency_key, complete, results]
      properties:
        idempotency_key:
          type: string
        complete:
          type: boolean
          enum: [true]
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkJobLaunchResult'
    BulkJobLaunchResult:
      type: object
      required: [index, status, http_status]
      properties:
        index:
          type: integer
          minimum: 0
        identifier:
          type: string
        status:
          type: string
          enum: [accepted, rejected]
        http_status:
          type: integer
        job_id:
          type: integer
          format: int64
        code:
          type: string
          enum: [not_found_or_forbidden, invalid_request, conflict, internal_error]
        error:
          type: string
