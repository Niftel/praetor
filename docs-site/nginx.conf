server {
    listen 80;
    absolute_redirect off;
    root /usr/share/nginx/html;

    location / {
        # Serve the file, else the page's built HTML, else its directory index —
        # directly, without a trailing-slash redirect. Docusaurus builds
        # directory-style pages (concepts/execution-packs/index.html).
        try_files $uri $uri.html $uri/index.html =404;
    }
}
