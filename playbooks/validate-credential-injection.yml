---
- name: Validate credential injection without disclosing it
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Verify the Machine credential file path reached Ansible
      ansible.builtin.assert:
        that:
          - lookup('ansible.builtin.env', 'ANSIBLE_PASSWORD_FILE') | length > 0
      no_log: true
    - name: Inspect the injected credential file without reading its content
      ansible.builtin.stat:
        path: "{{ lookup('ansible.builtin.env', 'ANSIBLE_PASSWORD_FILE') }}"
      register: credential_file
      no_log: true
    - name: Verify the credential file is private and populated
      ansible.builtin.assert:
        that:
          - credential_file.stat.exists
          - credential_file.stat.mode == '0600'
          - credential_file.stat.size >= 32
      no_log: true
