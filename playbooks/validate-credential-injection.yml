---
- name: Validate credential injection without disclosing it
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Verify the Machine credential reached Ansible as a private file
      ansible.builtin.assert:
        that:
          - lookup('ansible.builtin.env', 'ANSIBLE_PASSWORD_FILE') | length > 0
          - lookup('ansible.builtin.file', lookup('ansible.builtin.env', 'ANSIBLE_PASSWORD_FILE')) | length >= 32
      no_log: true
