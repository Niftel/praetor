server {
    listen 80;

    # The SPA shell must never be cached: it points at hash-named JS/CSS, so a
    # stale index.html would load a since-deleted asset and render a blank page.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate";
        expires -1;
    }

    # Build assets are content-addressed (index-<hash>.js); safe to cache hard.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
