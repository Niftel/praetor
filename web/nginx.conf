server {
    listen 80;

    # The SPA shell must never be cached: it points at hash-named JS/CSS, so a
    # stale index.html would load a since-deleted asset and render a blank page.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate";
        expires -1;
    }

    # Build assets are content-addressed (index-<hash>.js); safe to cache hard.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Use Docker's embedded DNS and resolve the upstream per request via a
        # variable, so an `api` container rebuild (which changes its IP) never
        # leaves nginx proxying a stale/dead address (502s until a ui restart).
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8080;
        # With a variable in proxy_pass, nginx no longer rewrites the location
        # prefix, so forward the full original URI explicitly. The frontend calls
        # /api/v1/... and the API serves those paths, so this is a pass-through.
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
