# The default Execution Pack: the full 'ansible' distribution (engine + the
# bundled community collections). Reproduces the pack the executor pushes by
# default. Build with:
#   make execpack SPEC=build/execpack/specs/default.yml
name: ansible-runtime          # -> build/runtime/ansible-runtime-linux-<arch>.tar.gz
python: "3.11.9"
ansible: "12.3.0"              # full 'ansible' package, pinned (bundles collections)
host_runner: v0.7.1            # required: the daemon release bundled into the pack
arches:
  - arm64
  # - amd64                    # uncomment to also build for Intel/AMD hosts
