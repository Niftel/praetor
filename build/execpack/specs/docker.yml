# Example custom Execution Pack: lean ansible-core plus the pip deps needed to
# manage Docker and query JSON. Collections are NOT baked into the pack — declare
# them in the project's collections/requirements.yml instead.
#   make execpack SPEC=build/execpack/specs/docker.yml
name: docker-tools             # -> build/runtime/docker-tools-linux-<arch>.tar.gz
python: "3.11.9"
ansible_core: "2.19.11"        # lean engine (no bundled collections), pinned
pip:
  - docker                     # the Docker SDK the community.docker modules need
  - jmespath                   # for the json_query filter
arches:
  - arm64
