# Example custom Execution Pack: a lean ansible-core plus the pieces needed to
# manage Docker and query JSON. Shows how a spec adds collections and pip deps.
#   make execpack SPEC=build/execpack/specs/docker.yml
name: docker-tools             # -> build/runtime/docker-tools-linux-<arch>.tar.gz
python: "3.11.9"
ansible: ansible-core          # lean base (no bundled community collections)
collections:
  - community.docker           # docker_container / docker_image modules
  - community.general
pip:
  - docker                     # the Docker SDK the community.docker modules need
  - jmespath                   # for the json_query filter
arches:
  - arm64
