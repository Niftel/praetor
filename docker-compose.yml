# Default container-log rotation applied to every service (issue #33): json-file
# capped at 10MB x 3 files so Docker's container logs can't grow without bound.
# Referenced per-service as `logging: *default-logging`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nats:
    logging: *default-logging
    # Pinned + alpine variant (has a shell/wget for the healthcheck below).
    image: nats:2.10-alpine
    restart: unless-stopped
    # JetStream with file-based persistence (job events survive a consumer/DB
    # outage or NATS restart and can be replayed). Driven by a config file rather
    # than inline args so the file store can be BOUNDED (max_file_store) — there is
    # no CLI flag for that. store_dir /data/jetstream matches the previous `-sd
    # /data`, so existing streams are preserved; http_port 8222 keeps the
    # monitoring endpoint the healthcheck uses.
    command: ["-c", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    # Bound to localhost: no auth on the client/monitor ports, so don't expose them
    # to the LAN. In-cluster services reach NATS by service name, not host port.
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats-data:/data
      - ./deployments/nats/nats.conf:/etc/nats/nats.conf:ro
    networks:
      - praetor-net

  db:
    logging: *default-logging
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: praetor
    # Persist platform state (jobs, credentials, RBAC, identities) on a named
    # volume so it survives container recreation. Back up with:
    #   docker compose exec db pg_dump -U postgres praetor > praetor.sql
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bound to localhost: the DB should never be reachable from the LAN. Services
    # connect in-cluster as db:5432; the host port is for local psql/tooling only.
    ports:
      - "127.0.0.1:${PRAETOR_DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - praetor-net

  # Mock LDAP server for testing
  ldap:
    logging: *default-logging
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "Praetor Demo"
      LDAP_DOMAIN: "praetor.local"
      LDAP_BASE_DN: "dc=praetor,dc=local"
      # Same source as the API's PRAETOR_LDAP_BIND_PASSWORD so the mock's admin pw
      # and the bind password stay in sync from one variable (demo default: admin).
      LDAP_ADMIN_PASSWORD: "${PRAETOR_LDAP_BIND_PASSWORD:-admin}"
      LDAP_CONFIG_PASSWORD: "config"
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: "readonly"
      LDAP_READONLY_USER_PASSWORD: "readonly"
      LDAP_SEED_INTERNAL_LDIF_PATH: "/tmp/ldif"
    # Bound to localhost: api reaches LDAP in-cluster as ldap:389.
    ports:
      - "127.0.0.1:389:389"
      - "127.0.0.1:636:636"
    volumes:
      - ./deployments/ldap/bootstrap.ldif:/tmp/ldif/bootstrap.ldif:ro
    networks:
      - praetor-net

  migrator:
    logging: *default-logging
    build:
      context: .
      dockerfile: build/package/Dockerfile.migrator
    environment:
      # Use service name 'db'
      DATABASE_URL: postgres://postgres:postgres@db:5432/praetor?sslmode=disable
      # Needed to encrypt the automation identity's private key at seed time.
      PRAETOR_SECRET_KEY: "${PRAETOR_SECRET_KEY:-}"
      # DEV DEFAULT: allow the built-in insecure key when PRAETOR_SECRET_KEY/JWT_SECRET
      # are unset. Production MUST set real secrets (then this is irrelevant) and
      # should set PRAETOR_ALLOW_INSECURE_DEFAULTS=false so a missing secret fails hard.
      PRAETOR_ALLOW_INSECURE_DEFAULTS: "${PRAETOR_ALLOW_INSECURE_DEFAULTS:-true}"
      # Break-glass LOCAL superuser (authenticates locally, never via LDAP). The demo
      # directory has no admin user, so this is how you log in / bootstrap. Demo
      # default admin/admin; override in .env for anything shared.
      PRAETOR_BOOTSTRAP_ADMIN_USERNAME: "${PRAETOR_BOOTSTRAP_ADMIN_USERNAME:-admin}"
      PRAETOR_BOOTSTRAP_ADMIN_PASSWORD: "${PRAETOR_BOOTSTRAP_ADMIN_PASSWORD:-admin}"
      PRAETOR_BOOTSTRAP_ADMIN_EMAIL: "${PRAETOR_BOOTSTRAP_ADMIN_EMAIL:-admin@praetor.local}"
    volumes:
      # One-time import of any existing keypair into the DB-managed automation
      # identity (read-only; generated fresh if absent).
      - ./keys:/tmp/keys:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - praetor-net
    # Run once and exit
    restart: on-failure

  ingestion:
    logging: *default-logging
    build:
      context: .
      dockerfile: build/package/Dockerfile.ingestion
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/praetor?sslmode=disable
      INGESTION_PORT: 8081
      NATS_URL: nats://nats:4222
      # Ingestion now decrypts Machine credentials server-side for the executor's
      # run-scoped resolve endpoint, so it needs the encryption key + the shared
      # internal token that authenticates that endpoint.
      PRAETOR_SECRET_KEY: "${PRAETOR_SECRET_KEY:-}"
      PRAETOR_SECRET_KEY_OLD: "${PRAETOR_SECRET_KEY_OLD:-}"
      PRAETOR_ALLOW_INSECURE_DEFAULTS: "${PRAETOR_ALLOW_INSECURE_DEFAULTS:-true}"
      PRAETOR_INTERNAL_TOKEN: "${PRAETOR_INTERNAL_TOKEN:-dev-internal-token}"
    ports:
      - "8090:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      migrator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - praetor-net

  api:
    logging: *default-logging
    build:
      context: .
      dockerfile: build/package/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/praetor?sslmode=disable
      # Secrets are now required (no built-in fallback). Override both via .env in any
      # real deployment. PRAETOR_SECRET_KEY must be exactly 32 bytes; rotate by setting
      # PRAETOR_SECRET_KEY to the new key and PRAETOR_SECRET_KEY_OLD to the previous one.
      JWT_SECRET: "${JWT_SECRET:-}"
      PRAETOR_SECRET_KEY: "${PRAETOR_SECRET_KEY:-}"
      # DEV DEFAULT: allow the built-in insecure key when PRAETOR_SECRET_KEY/JWT_SECRET
      # are unset. Production MUST set real secrets (then this is irrelevant) and
      # should set PRAETOR_ALLOW_INSECURE_DEFAULTS=false so a missing secret fails hard.
      PRAETOR_ALLOW_INSECURE_DEFAULTS: "${PRAETOR_ALLOW_INSECURE_DEFAULTS:-true}"
      PRAETOR_SECRET_KEY_OLD: "${PRAETOR_SECRET_KEY_OLD:-}"
      PORT: 8080
      INGESTION_URL: http://ingestion:8081 # for proxying run logs from the object store
      # Presented to ingestion's authenticated log-read endpoint; must match
      # ingestion's PRAETOR_INTERNAL_TOKEN.
      PRAETOR_INTERNAL_TOKEN: "${PRAETOR_INTERNAL_TOKEN:-dev-internal-token}"
      PRAETOR_LDAP_CONFIG: /etc/praetor/ldap.yaml
      # LDAP bind password, read by ldap-config.yaml via bind_password_env (never
      # committed in the config file). Demo default matches the mock's admin pw.
      PRAETOR_LDAP_BIND_PASSWORD: "${PRAETOR_LDAP_BIND_PASSWORD:-admin}"
    volumes:
      - ./deployments/ldap/ldap-config.yaml:/etc/praetor/ldap.yaml:ro
    ports:
      - "${PRAETOR_API_PORT:-8080}:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      ldap:
        condition: service_started
    networks:
      - praetor-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.praetor-api.rule=Host(`api.praetor.localhost`)"
      - "traefik.http.routers.praetor-api.entrypoints=websecure"
      - "traefik.http.services.praetor-api.loadbalancer.server.port=8080"
      - "traefik.http.routers.praetor-api-web.rule=Host(`api.praetor.localhost`)"
      - "traefik.http.routers.praetor-api-web.entrypoints=web"
      - "traefik.http.routers.praetor-api-web.middlewares=to-https@docker"

  # Pull-based recovery: SSHes to hosts whose runs are parked in 'reconciling'
  # (by the scheduler's heartbeat check) and harvests their WAL, so a job that
  # finished on the host but never pushed is recovered to its true outcome.
  reconciler:
    logging: *default-logging
    build:
      context: .
      dockerfile: build/package/Dockerfile.reconciler
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/praetor?sslmode=disable
      PRAETOR_SECRET_KEY: "${PRAETOR_SECRET_KEY:-}"
      # DEV DEFAULT: allow the built-in insecure key when PRAETOR_SECRET_KEY/JWT_SECRET
      # are unset. Production MUST set real secrets (then this is irrelevant) and
      # should set PRAETOR_ALLOW_INSECURE_DEFAULTS=false so a missing secret fails hard.
      PRAETOR_ALLOW_INSECURE_DEFAULTS: "${PRAETOR_ALLOW_INSECURE_DEFAULTS:-true}"
      PRAETOR_SECRET_KEY_OLD: "${PRAETOR_SECRET_KEY_OLD:-}"
      # Run event/log endpoints live on the ingestion service.
      INGESTION_URL: http://ingestion:8081
      RECONCILE_INTERVAL: "30s"
    volumes:
      # Share the executor's SSH known_hosts so host-key trust is consistent.
      - praetor-ssh:/home/praetor/.ssh
    depends_on:
      migrator:
        condition: service_completed_successfully
      ingestion:
        condition: service_healthy
    networks:
      - praetor-net
    restart: unless-stopped

  scheduler:
    logging: *default-logging
    build:
      context: .
      dockerfile: build/package/Dockerfile.scheduler
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/praetor?sslmode=disable
      NATS_URL: nats://nats:4222
      PRAETOR_SECRET_KEY: "${PRAETOR_SECRET_KEY:-}"
      # DEV DEFAULT: allow the built-in insecure key when PRAETOR_SECRET_KEY/JWT_SECRET
      # are unset. Production MUST set real secrets (then this is irrelevant) and
      # should set PRAETOR_ALLOW_INSECURE_DEFAULTS=false so a missing secret fails hard.
      PRAETOR_ALLOW_INSECURE_DEFAULTS: "${PRAETOR_ALLOW_INSECURE_DEFAULTS:-true}"
      PRAETOR_SECRET_KEY_OLD: "${PRAETOR_SECRET_KEY_OLD:-}"
      API_URL: http://api:8080
      # Retention pruning (opt-out): defaults to 90 days so job history (rows +
      # events + log blobs) doesn't grow without bound (issue #17). Set
      # JOB_RETENTION_DAYS=0 to keep everything forever.
      JOB_RETENTION_DAYS: "${JOB_RETENTION_DAYS:-90}"
    depends_on:
      migrator:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    networks:
      - praetor-net

  executor:
    logging: *default-logging
    # The executor service lives in its own repo (github.com/praetordev/executor),
    # checked out alongside this one. Image name stays praetor-executor so kind-load
    # and the Helm chart are unaffected by the split.
    build:
      context: ../executor
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NATS_URL: nats://nats:4222
      INGESTION_URL: http://ingestion:8081
      # Authenticates the executor to ingestion's run-scoped credential-resolve
      # endpoint; must match ingestion's PRAETOR_INTERNAL_TOKEN.
      PRAETOR_INTERNAL_TOKEN: "${PRAETOR_INTERNAL_TOKEN:-dev-internal-token}"
      # Address managed hosts use to call back to the control plane. Must be
      # reachable FROM the target: internal service DNS only works for hosts on
      # praetor-net, so point it at the ingestion service's published address
      # (reachable from both on-network and external hosts). In a real deployment
      # this is the control plane's routable URL.
      HOST_RUNNER_CALLBACK_URL: "${HOST_RUNNER_CALLBACK_URL:-http://host.docker.internal:8090}"
      # Pull Execution Packs from Gitea's package registry over HTTP (the artifact
      # store the packbuilder publishes to), decoupling the executor from the
      # builder's filesystem. The ./build mount below is now only a fallback for
      # packs not in the registry (execpack CLI / pre-built artifacts).
      GITEA_INTERNAL_URL: "${PRAETOR_GITEA_INTERNAL_URL:-http://gitea-host:3000}"
      GITEA_OWNER: "${PRAETOR_GITEA_OWNER:-praetor}"
      EXECUTOR_WORKERS: 2
      ANSIBLE_FORKS: 1
    shm_size: 1gb
    volumes:
      # The executor no longer mounts ./keys: job connection keys come from each
      # job's Machine credential (resolved at dispatch to an ephemeral per-run
      # file), not a shared key staged in the container. The demo targets still
      # mount ./keys to authorize the demo credential's public key.
      # Fallback source for locally-built Execution Pack tarballs
      # (build/runtime/<pack>-linux-<arch>.tar.gz from `make execpack`), used only
      # when a pack isn't in the Gitea registry. The host-runner daemon is NOT
      # served from here — it ships inside the pack (single source, checksum-
      # verified at pack build). A directory mount reflects rebuilds immediately.
      - ./build:/tmp/build:ro
      # Canonical checkpoint/resume callback plugin, from its source of truth in the
      # executor repo (executor ships it to targets at bootstrap), so jobs get
      # task-level resume out of the box. The bootstrap copies it from here.
      - ../executor/deploy/plugins:/tmp/plugins:ro
      # Persist SSH known_hosts (trust-on-first-use) across executor restarts.
      # Mounted at the runtime user's ~/.ssh so the non-root process can write it.
      - praetor-ssh:/home/praetor/.ssh
      # Persist localhost-run WAL/state (/var/lib/praetor/jobs) and extracted packs
      # across executor restarts, so an interrupted local run can be recovered on
      # startup instead of being declared lost (#45). Without this a container
      # restart destroys the WAL and recovery is impossible.
      - praetor-jobs:/var/lib/praetor
      - praetor-packs:/opt/praetor/packs
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - praetor-net

  # Demo cluster - target hosts for Ansible playbooks. RHEL-family (Rocky Linux 9,
  # glibc) so the self-contained Execution Pack (glibc CPython + Ansible) runs on
  # them AND the demo playbooks' RHEL conventions (httpd, /etc/httpd/...) apply.
  # Alpine (musl) cannot exec the pack's binaries. Targets get ONLY sshd + python3
  # + sudo — Ansible/httpd travel in the pushed pack / playbook, NOT pre-installed
  # here (that's the whole point of Praetor).
  web1:
    logging: *default-logging
    profiles: ["demo"]
    image: &target_image rockylinux:9
    hostname: web1
    command: &target_cmd >
      /bin/sh -c "dnf install -y --setopt=install_weak_deps=False openssh-server openssh-clients python3 sudo shadow-utils && ssh-keygen -A && mkdir -p /run/sshd /var/empty/sshd /root/.ssh && chmod 700 /root/.ssh && while [ ! -f /tmp/keys/id_rsa.pub ]; do echo 'Waiting for keys...'; sleep 1; done && cat /tmp/keys/id_rsa.pub > /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys && (id praetor >/dev/null 2>&1 || useradd -m -s /bin/bash praetor) && echo 'praetor:praetor' | chpasswd && mkdir -p /home/praetor/.ssh && chmod 700 /home/praetor/.ssh && cat /tmp/keys/id_rsa.pub > /home/praetor/.ssh/authorized_keys && chmod 600 /home/praetor/.ssh/authorized_keys && chown -R praetor:praetor /home/praetor/.ssh && echo 'praetor ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers && /usr/sbin/sshd -D"
    volumes:
      - ./keys:/tmp/keys:ro
    networks:
      - praetor-net
    ports:
      - "${PRAETOR_WEB1_PORT:-8081}:80"

  web2:
    logging: *default-logging
    profiles: ["demo"]
    image: *target_image
    hostname: web2
    command: *target_cmd
    volumes:
      - ./keys:/tmp/keys:ro
    networks:
      - praetor-net
    ports:
      - "8082:80"

  db1:
    logging: *default-logging
    profiles: ["demo"]
    image: *target_image
    hostname: db1
    command: *target_cmd
    volumes:
      - ./keys:/tmp/keys:ro
    networks:
      - praetor-net

  # Keep backward compatibility
  target-host:
    logging: *default-logging
    profiles: ["demo"]
    image: *target_image
    hostname: target-host
    command: *target_cmd
    volumes:
      - ./keys:/tmp/keys:ro
    networks:
      - praetor-net

  consumer:
    logging: *default-logging
    # The consumer service lives in its own repo (github.com/praetordev/consumer),
    # checked out alongside this one. Image name stays praetor-consumer so kind-load
    # and the Helm chart are unaffected by the split.
    build:
      context: ../consumer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/praetor?sslmode=disable
      NATS_URL: nats://nats:4222
      PRAETOR_SECRET_KEY: "${PRAETOR_SECRET_KEY:-}"
      # DEV DEFAULT: allow the built-in insecure key when PRAETOR_SECRET_KEY/JWT_SECRET
      # are unset. Production MUST set real secrets (then this is irrelevant) and
      # should set PRAETOR_ALLOW_INSECURE_DEFAULTS=false so a missing secret fails hard.
      PRAETOR_ALLOW_INSECURE_DEFAULTS: "${PRAETOR_ALLOW_INSECURE_DEFAULTS:-true}"
      PRAETOR_SECRET_KEY_OLD: "${PRAETOR_SECRET_KEY_OLD:-}"
    depends_on:
      migrator:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    networks:
      - praetor-net

  # Dedicated BuildKit daemon for the packbuilder (issue #46): the packbuilder no
  # One-shot: generates the mTLS material (CA + daemon cert + client cert) shared
  # by buildkitd and the packbuilder, into the buildkit-certs volume. Idempotent —
  # a second run is a no-op if the CA already exists. buildkitd/packbuilder wait on
  # its successful completion so the certs are present before they start.
  buildkit-certgen:
    logging: *default-logging
    image: alpine:3.19
    entrypoint: ["/bin/sh", "/gen-certs.sh"]
    volumes:
      - buildkit-certs:/certs
      - ./deployments/buildkit/gen-certs.sh:/gen-certs.sh:ro
    restart: "no"

  # longer mounts the host docker.sock — it drives builds over BuildKit's gRPC API.
  # Privileged, but single-purpose: no host socket, no host mounts, no published
  # ports. --oci-worker-net=host makes build RUN steps share THIS container's netns
  # (on praetor-net) so they can reach the in-cluster Gitea mirror by IP (the
  # packbuilder pins the names via build add-hosts). The gRPC listener is secured
  # with mTLS (--tlscacert/--tlscert/--tlskey): buildkitd requires a client cert
  # signed by the shared CA, so nothing else on praetor-net can drive builds. Certs
  # come from buildkit-certgen via the buildkit-certs volume.
  buildkitd:
    logging: *default-logging
    image: moby/buildkit:v0.13.2
    privileged: true
    command:
      - --addr=tcp://0.0.0.0:1234
      - --oci-worker-net=host
      - --tlscacert=/certs/ca.pem
      - --tlscert=/certs/daemon-cert.pem
      - --tlskey=/certs/daemon-key.pem
    volumes:
      - buildkit-cache:/var/lib/buildkit
      - buildkit-certs:/certs:ro
    networks:
      - praetor-net
    depends_on:
      buildkit-certgen:
        condition: service_completed_successfully
    restart: unless-stopped

  # Builds Execution Packs from their YAML spec by driving the buildkitd daemon
  # (no host socket) and publishes the tarball to Gitea (or ./build/runtime).
  packbuilder:
    logging: *default-logging
    build:
      context: .
      dockerfile: build/package/Dockerfile.packbuilder
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/praetor?sslmode=disable
      # Build against Gitea's browser-facing name (fronted by Traefik) so the pack's
      # absolute package URLs resolve identically in the browser and at build time.
      GITEA_URL: "${PRAETOR_GITEA_URL:-http://gitea.localhost}"
      GITEA_OWNER: "${PRAETOR_GITEA_OWNER:-praetor}"
      TRAEFIK_CONTAINER: praetor-traefik
      # Publish the built pack to Gitea's generic package registry (in-cluster
      # name, server-side; distinct from the browser-facing GITEA_URL used for the
      # build). Needs a write:package token; without one the builder falls back to
      # writing the tarball into the shared ./build/runtime dir (legacy).
      GITEA_INTERNAL_URL: "${PRAETOR_GITEA_INTERNAL_URL:-http://gitea-host:3000}"
      GITEA_TOKEN: "${PRAETOR_GITEA_TOKEN:-}"
      # Drive the dedicated BuildKit daemon over gRPC — no host Docker socket (#46).
      BUILDKIT_HOST: tcp://buildkitd:1234
      # mTLS to buildkitd: present the client cert and verify the daemon's, so the
      # otherwise-open gRPC listener on praetor-net only accepts this builder. The
      # servername must match the daemon cert's CN/SAN (buildkitd). Certs are shared
      # via the buildkit-certs volume, mounted read-only below.
      BUILDKIT_TLS_CACERT: /certs/ca.pem
      BUILDKIT_TLS_CERT: /certs/client-cert.pem
      BUILDKIT_TLS_KEY: /certs/client-key.pem
      BUILDKIT_TLS_SERVERNAME: buildkitd
    volumes:
      # No docker.sock. ./build carries the Dockerfile (build/ansible-runtime) and
      # the legacy ./build/runtime output dir (when GITEA_TOKEN is unset).
      - ./build:/build:rw
      - buildkit-certs:/certs:ro
    depends_on:
      migrator:
        condition: service_completed_successfully
      buildkit-certgen:
        condition: service_completed_successfully
      buildkitd:
        condition: service_started
    networks:
      - praetor-net
    restart: unless-stopped

  ui:
    logging: *default-logging
    restart: unless-stopped
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "${PRAETOR_UI_PORT:-3000}:80"
    depends_on:
      - api
    networks:
      - praetor-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.praetor-ui.rule=Host(`praetor.localhost`)"
      - "traefik.http.routers.praetor-ui.entrypoints=websecure"
      - "traefik.http.services.praetor-ui.loadbalancer.server.port=80"
      - "traefik.http.routers.praetor-ui-web.rule=Host(`praetor.localhost`)"
      - "traefik.http.routers.praetor-ui-web.entrypoints=web"
      - "traefik.http.routers.praetor-ui-web.middlewares=to-https@docker"

  # Gitea: Praetor's infra artifact registry — host-runner daemon releases and the
  # mirrored Python/PyPI packages the Execution Pack build pulls from. State lives
  # on the gitea-data volume; reachable in-cluster as gitea-host:3000.
  gitea-host:
    logging: *default-logging
    build:
      context: deployments/gitea
    # Pinned so the pack build (docker inspect gitea-host) and in-cluster DNS both
    # resolve the same stable name.
    container_name: gitea-host
    hostname: gitea-host
    ports:
      - "${PRAETOR_GITEA_PORT:-3002}:3000"
    volumes:
      - gitea-data:/var/lib/gitea
    networks:
      - praetor-net
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`gitea.localhost`)"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"

  # Read-only Docker API proxy for traefik's service discovery. traefik is the only
  # edge-exposed container (binds :80/:443), so giving it the raw root-equivalent
  # /var/run/docker.sock means an RCE in traefik = host compromise. Instead it talks
  # to this single-purpose haproxy, which exposes only the GET endpoints the Docker
  # provider needs (containers/events/version) and no POST. It lives on an
  # internal-only network shared solely with traefik: container-inspect output
  # includes every service's env (secrets/tokens/LDAP pw), so it must NOT be
  # reachable from praetor-net (which the demo target hosts also share).
  docker-socket-proxy:
    logging: *default-logging
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: 1 # EVENTS/PING/VERSION default on; POST/other endpoints stay off
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker-proxy-net
    restart: unless-stopped

  # Reverse proxy: routes *.localhost hostnames to services (browser-friendly,
  # *.localhost auto-resolves to 127.0.0.1). Dashboard at http://traefik.localhost.
  traefik:
    logging: *default-logging
    image: traefik:v3.7.6
    container_name: praetor-traefik
    command:
      - "--providers.docker=true"
      # Discover via the read-only socket proxy, not the raw host socket.
      - "--providers.docker.endpoint=tcp://docker-socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=praetor_praetor-net"
      # File provider supplies the default TLS cert (mkcert) for websecure.
      - "--providers.file.directory=/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Serve TLS by default for every router on the websecure entrypoint, using
      # the default cert from the file provider — no per-router tls labels needed.
      # HTTP->HTTPS is redirected per-router (not entrypoint-wide) so Gitea can
      # stay plaintext for the pack build, which can't trust the local mkcert CA.
      - "--entrypoints.websecure.http.tls=true"
      - "--api.dashboard=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # No raw docker.sock: discovery goes through docker-socket-proxy (above).
      - ./deployments/traefik/dynamic:/dynamic:ro
      - ./deployments/traefik/certs:/certs:ro
    networks:
      - praetor-net
      - docker-proxy-net
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Shared redirect middleware: bump plaintext HTTP to HTTPS (Praetor routers only).
      - "traefik.http.middlewares.to-https.redirectscheme.scheme=https"
      # Dashboard on HTTPS, with an HTTP router that redirects up.
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard-web.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard-web.entrypoints=web"
      - "traefik.http.routers.dashboard-web.middlewares=to-https@docker"
      - "traefik.http.routers.dashboard-web.service=api@internal"

  # Documentation site (Docusaurus, built to static HTML + nginx). Reachable at
  # https://docs.localhost via Traefik, or http://localhost:3006.
  docs:
    logging: *default-logging
    profiles: ["docs"]
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    ports:
      - "${PRAETOR_DOCS_PORT:-3006}:80"
    networks:
      - praetor-net
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docs.rule=Host(`docs.localhost`)"
      - "traefik.http.routers.docs.entrypoints=websecure"
      - "traefik.http.services.docs.loadbalancer.server.port=80"
      - "traefik.http.routers.docs-web.rule=Host(`docs.localhost`)"
      - "traefik.http.routers.docs-web.entrypoints=web"
      - "traefik.http.routers.docs-web.middlewares=to-https@docker"

  # Metrics stack: Prometheus scrapes every service's /metrics (in-network by
  # service name); Grafana renders them with a pre-provisioned datasource +
  # starter dashboard. Both are dev conveniences reachable on published ports.
  prometheus:
    logging: *default-logging
    profiles: ["observability"]
    image: prom/prometheus:v3.1.0
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - praetor-net
    restart: unless-stopped

  grafana:
    logging: *default-logging
    profiles: ["observability"]
    image: grafana/grafana:11.5.0
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3005:3000"
    depends_on:
      - prometheus
    networks:
      - praetor-net
    restart: unless-stopped

networks:
  praetor-net:
    driver: bridge
  # Isolated network carrying ONLY traefik <-> docker-socket-proxy. internal:true
  # keeps it off any external bridge; it is deliberately NOT shared with
  # praetor-net so the proxy's container-inspect data (service env/secrets) is
  # unreachable from application services and the demo target hosts.
  docker-proxy-net:
    internal: true

volumes:
  pgdata:
  nats-data:
  praetor-ssh:
  praetor-jobs:  # localhost-run WAL/state, persisted for crash recovery (#45)
  praetor-packs: # extracted Execution Packs, persisted so recovery needn't re-fetch
  buildkit-cache: # BuildKit daemon layer/build cache (#46)
  buildkit-certs: # mTLS CA + daemon/client certs shared by buildkitd & packbuilder
  prometheus-data:
  grafana-data:
  # Holds Gitea's config/DB/repos + the Execution Pack registry. Declared external
  # on purpose so `docker compose down -v` can't wipe the registry. Because of that,
  # a fresh checkout must create it first — and it should be backed up:
  #   scripts/gitea-volume.sh init                 # once, on a fresh checkout
  #   scripts/gitea-volume.sh backup [FILE]        # tar it out
  #   scripts/gitea-volume.sh restore FILE         # restore (gitea stopped)
  gitea-data:
    external: true
