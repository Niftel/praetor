apiVersion: apps/v1
kind: Deployment
metadata:
  name: praetor-validation-ldap
  labels: {app.kubernetes.io/part-of: praetor-validation-fixture}
spec:
  replicas: 1
  selector:
    matchLabels: {app: praetor-validation-ldap}
  template:
    metadata:
      labels: {app: praetor-validation-ldap, app.kubernetes.io/part-of: praetor-validation-fixture}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ldap
          image: docker.io/osixia/openldap@sha256:18742e9c449c9c1afe129d3f2f3ee15fb34cc43e5f940a20f3399728f41d7c28
          env:
            - {name: LDAP_ORGANISATION, value: "Praetor Validation"}
            - {name: LDAP_DOMAIN, value: "praetor.local"}
            - {name: LDAP_ADMIN_PASSWORD, value: "admin"}
            - {name: LDAP_SEED_INTERNAL_LDIF_PATH, value: /tmp/ldif}
            # Kubernetes injects LDAP_PORT=tcp://... for the Service named ldap;
            # the image expects a numeric listener port under the same name.
            - {name: LDAP_PORT, value: "389"}
          ports: [{name: ldap, containerPort: 389}]
          volumeMounts:
            - {name: bootstrap, mountPath: /tmp/ldif/bootstrap.ldif, subPath: bootstrap.ldif, readOnly: true}
          readinessProbe: {tcpSocket: {port: ldap}, initialDelaySeconds: 5, periodSeconds: 5}
          resources: {requests: {cpu: 25m, memory: 64Mi}, limits: {memory: 256Mi}}
      volumes:
        - name: bootstrap
          configMap: {name: praetor-validation-ldap-bootstrap}
---
apiVersion: v1
kind: Service
metadata:
  name: ldap
  labels: {app.kubernetes.io/part-of: praetor-validation-fixture}
spec:
  selector: {app: praetor-validation-ldap}
  ports: [{name: ldap, port: 389, targetPort: ldap}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: praetor-validation-notification-sink
  labels: {app.kubernetes.io/part-of: praetor-validation-fixture}
spec:
  replicas: 1
  selector:
    matchLabels: {app: praetor-validation-notification-sink}
  template:
    metadata:
      labels: {app: praetor-validation-notification-sink, app.kubernetes.io/part-of: praetor-validation-fixture}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: sink
          image: nginx:alpine-slim@sha256:dd722b8ee8794f3c273bfaf8b5351b0652a68ccd73c17e5f0d029857a58f25ef
          ports: [{name: http, containerPort: 8080}]
          readinessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 2, periodSeconds: 3}
          resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {memory: 64Mi}}
          volumeMounts:
            - {name: config, mountPath: /etc/nginx/conf.d}
      volumes:
        - name: config
          configMap: {name: praetor-validation-notification-sink}
---
apiVersion: v1
kind: Service
metadata:
  name: praetor-validation-notification-sink
  labels: {app.kubernetes.io/part-of: praetor-validation-fixture}
spec:
  selector: {app: praetor-validation-notification-sink}
  ports: [{name: http, port: 8080, targetPort: http}]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: praetor-validation-notification-sink
  labels: {app.kubernetes.io/part-of: praetor-validation-fixture}
data:
  default.conf: |
    log_format notification escape=none '$request_body';
    access_log /dev/stdout notification;
    server {
      listen 8080;
      location = /healthz { access_log off; return 204; }
      # Proxying forces nginx to consume the request body before access_log
      # evaluates $request_body. The internal endpoint is not logged, keeping
      # exactly one JSON log record per notification delivery.
      location / {
        rewrite ^ /capture break;
        proxy_pass http://127.0.0.1:8080;
      }
      location = /capture { access_log off; return 204; }
    }
