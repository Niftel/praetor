{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "praetor.fullname" . }}
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
        {{- if .Values.ingress.apiHost }}
        - {{ .Values.ingress.apiHost | quote }}
        {{- end }}
        - {{ .Values.ingress.ingestionHost | quote }}
      {{- if .Values.ingress.tls.secretName }}
      secretName: {{ .Values.ingress.tls.secretName }}
      {{- end }}
  {{- end }}
  rules:
    # UI (which itself proxies /api/ to the api service).
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "praetor.fullname" . }}-ui
                port:
                  number: {{ .Values.ui.service.port }}
    {{- if .Values.ingress.apiHost }}
    # Optional dedicated api host.
    - host: {{ .Values.ingress.apiHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "praetor.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
    {{- end }}
    # Ingestion callback endpoint — MUST be reachable from managed hosts (external).
    - host: {{ .Values.ingress.ingestionHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "praetor.fullname" . }}-ingestion
                port:
                  number: {{ .Values.ingestion.service.port }}
{{- end }}
