apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "praetor.fullname" . }}-api
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "praetor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "praetor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "praetor.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "praetor.waitForMigrations" . | nindent 8 }}
      containers:
        - name: api
          image: {{ include "praetor.image" (dict "root" . "svc" "api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "praetor.configMapName" . }}
            - secretRef:
                name: {{ include "praetor.secretName" . }}
          {{- if or .Values.api.extraEnv .Values.secretsService.enabled }}
          env:
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.secretsService.enabled }}
            - name: PRAETOR_SECRETS_URL
              value: {{ .Values.secretsService.url | quote }}
            - name: PRAETOR_SECRETS_CA_FILE
              value: /var/run/secrets/praetor-secrets/ca.crt
            - name: PRAETOR_SECRETS_CERT_FILE
              value: /var/run/secrets/praetor-secrets/tls.crt
            - name: PRAETOR_SECRETS_KEY_FILE
              value: /var/run/secrets/praetor-secrets/tls.key
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- if or .Values.ldap.enabled .Values.secretsService.enabled }}
          volumeMounts:
            {{- if .Values.ldap.enabled }}
            - name: ldap-config
              mountPath: /etc/praetor/ldap.yaml
              subPath: ldap.yaml
              readOnly: true
            {{- end }}
            {{- if .Values.secretsService.enabled }}
            - name: secrets-service-identity
              mountPath: /var/run/secrets/praetor-secrets
              readOnly: true
            {{- end }}
          {{- end }}
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or .Values.ldap.enabled .Values.secretsService.enabled }}
      volumes:
        {{- if .Values.ldap.enabled }}
        - name: ldap-config
          configMap:
            name: {{ include "praetor.fullname" . }}-ldap
        {{- end }}
        {{- if .Values.secretsService.enabled }}
        - name: secrets-service-identity
          secret:
            secretName: {{ .Values.secretsService.apiIdentitySecret | quote }}
            items:
              - key: ca.crt
                path: ca.crt
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
            defaultMode: 0444
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "praetor.fullname" . }}-api
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    {{- include "praetor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
