{{- if not .Values.secrets.existingSecret -}}
{{- if and (not .Values.allowInsecureDefaults) (not .Values.secrets.secretKey) -}}
{{- fail "secrets.secretKey is required (exactly 32 bytes) unless allowInsecureDefaults=true. Set it, or provide secrets.existingSecret." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "praetor.secretName" . }}
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "praetor.databaseUrl" . | quote }}
  PRAETOR_SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  PRAETOR_SECRET_KEY_OLD: {{ .Values.secrets.secretKeyOld | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  PRAETOR_INTERNAL_TOKEN: {{ .Values.secrets.internalToken | quote }}
  PRAETOR_LDAP_BIND_PASSWORD: {{ .Values.secrets.ldapBindPassword | quote }}
{{- end }}
