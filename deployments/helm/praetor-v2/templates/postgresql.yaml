{{- if and .Values.database.bundled.enabled (not .Values.database.external.url) -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "praetor.fullname" . }}-postgresql
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    {{- include "praetor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "praetor.fullname" . }}-postgresql
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ include "praetor.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "praetor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "praetor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgresql
          image: {{ .Values.database.bundled.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.database.bundled.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.database.bundled.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.database.bundled.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.database.bundled.user }} -d {{ .Values.database.bundled.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.database.bundled.user }} -d {{ .Values.database.bundled.database }}"]
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          {{- with .Values.database.bundled.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.database.bundled.storageClass }}
        storageClassName: {{ .Values.database.bundled.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.bundled.storage }}
{{- end }}
