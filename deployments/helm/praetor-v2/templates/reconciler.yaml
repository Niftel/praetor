apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "praetor.fullname" . }}-reconciler
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
    app.kubernetes.io/component: reconciler
spec:
  replicas: {{ .Values.reconciler.replicas }}
  selector:
    matchLabels:
      {{- include "praetor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: reconciler
  template:
    metadata:
      labels:
        {{- include "praetor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: reconciler
      {{- with .Values.reconciler.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "praetor.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "praetor.waitForMigrations" . | nindent 8 }}
      containers:
        - name: reconciler
          image: {{ include "praetor.image" (dict "root" . "svc" "reconciler") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "praetor.configMapName" . }}
            - secretRef:
                name: {{ include "praetor.secretName" . }}
          {{- with .Values.reconciler.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            # Own known_hosts (TOFU). Not shared with the executor in K8s — an RWX
            # cross-workload volume is an anti-pattern; each re-pins independently.
            - name: ssh
              mountPath: /home/praetor/.ssh
          {{- with .Values.reconciler.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: ssh
          emptyDir: {}
