apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "praetor.fullname" . }}-nginx
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
data:
  # Overrides the image's baked-in default.conf, which uses Docker's embedded DNS
  # (resolver 127.0.0.11) and a hardcoded http://api:8080 — neither exists in K8s.
  # Here we resolve via the cluster DNS and proxy to the api Service.
  default.conf: |
    server {
        listen 80;

        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, must-revalidate";
            expires -1;
        }

        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            # Unlike compose (where container IPs churn, forcing a per-request
            # variable+resolver), a K8s Service VIP is stable — so a plain static
            # upstream is correct: nginx resolves the Service name once at startup
            # via the pod's cluster DNS. No trailing slash → the /api/ prefix is
            # preserved (the api serves /api/v1/...).
            proxy_pass http://{{ include "praetor.fullname" . }}-api:{{ .Values.api.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "praetor.fullname" . }}-ui
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  {{- with .Values.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "praetor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "praetor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
      {{- with .Values.ui.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "praetor.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ include "praetor.image" (dict "root" . "svc" "ui") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.port }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          {{- with .Values.ui.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "praetor.fullname" . }}-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "praetor.fullname" . }}-ui
  labels:
    {{- include "praetor.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
  selector:
    {{- include "praetor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
