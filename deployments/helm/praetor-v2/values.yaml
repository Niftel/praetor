# Default values for the Praetor chart.
# See CHART-DESIGN.md for the reasoning behind every workload choice.

nameOverride: ""
fullnameOverride: ""

image:
  # Registry + repo prefix for the seven service images. Empty registry means the
  # image is referenced bare (repo:tag) — used by the local/k3d flow where images
  # are imported into the cluster rather than pulled from a registry.
  registry: ghcr.io/niftel
  # Tag shared by all service images. Empty → defaults to .Chart.appVersion.
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

# Per-service image repositories (joined with image.registry + image.tag).
images:
  api: praetor-api
  ingestion: praetor-ingestion
  scheduler: praetor-scheduler
  consumer: praetor-consumer
  reconciler: praetor-reconciler
  executor: praetor-executor
  ui: praetor-ui
  migrator: praetor-migrator

# Optional per-component registry overrides. A present empty value deliberately
# disables image.registry for that component, which is how local/k3d deploys
# combine imported development images with released images from GHCR.
imageRegistries: {}

# Per-component release versions. These are pinned by
# platform-compatibility.yaml and take precedence over image.tag. The shared tag
# remains a convenient override for local/k3d development.
imageTags:
  api: 0.1.5
  ingestion: 0.1.2
  scheduler: 0.1.6
  consumer: 0.1.3
  reconciler: 0.1.0
  executor: 0.1.4
  ui: 0.1.5
  migrator: 0.1.5

# Optional immutable manifest digests. When set, a digest takes precedence over
# both imageTags and image.tag and renders as registry/repository@sha256:....
# Release-candidate environments should populate every first-party component.
imageDigests: {}

# Optional strategy shared by stateless Deployments. Leave empty for the
# Kubernetes rolling-update default. Resource-constrained local environments
# can set maxSurge: 0 and maxUnavailable: 1 to avoid temporary quota spikes.
deploymentStrategy: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

# When false (the production default), a missing PRAETOR_SECRET_KEY/JWT_SECRET
# makes services fail hard instead of running on a built-in dev key. Set true only
# for throwaway installs where you don't provide secrets.
allowInsecureDefaults: false

# Break-glass LOCAL superuser, created by the migrator when enabled. It
# authenticates locally (never via LDAP), so a misconfigured/unreachable directory
# can't lock you out — and it provides a first superuser before any LDAP group
# grants one. The password is re-applied on every upgrade (the chart is the source
# of truth); a same-named LDAP user is never overwritten.
bootstrapAdmin:
  enabled: false
  username: admin
  email: ""
  password: ""   # required when enabled (unless supplied via secrets.existingSecret
                 # as PRAETOR_BOOTSTRAP_ADMIN_PASSWORD)

secrets:
  # If set, all secret values below are ignored and this pre-existing Secret is
  # used instead (bring your own ExternalSecrets/sealed-secrets). It must contain:
  # DATABASE_URL, PRAETOR_SECRET_KEY, PRAETOR_SECRET_KEY_OLD, JWT_SECRET,
  # PRAETOR_INTERNAL_TOKEN, PRAETOR_LDAP_BIND_PASSWORD, and (if bootstrapAdmin is
  # enabled) PRAETOR_BOOTSTRAP_ADMIN_PASSWORD.
  existingSecret: ""
  secretKey: ""            # exactly 32 bytes; required unless allowInsecureDefaults
  secretKeyOld: ""         # previous key during rotation
  jwtSecret: ""            # api token signing
  internalToken: ""        # shared api<->ingestion<->executor auth; must be identical
  ldapBindPassword: ""     # only used when ldap.enabled

# Provider-independent secrets service integration. Certificate material is
# never accepted as chart values: create the referenced Kubernetes Secrets with
# your PKI, External Secrets, Sealed Secrets, or certificate controller.
secretsService:
  enabled: false
  url: ""                   # required HTTPS service URL, e.g. https://praetor-secrets.praetor-secrets.svc:8443
  trustDomain: ""           # SPIFFE trust domain encoded in workload URI SANs
  claimPort: 8443
  apiIdentitySecret: ""       # keys: ca.crt, tls.crt, tls.key
  schedulerIdentitySecret: "" # keys: ca.crt, tls.crt, tls.key, claim.crt, claim.key, executor-ca.crt
  executorIdentitySecret: ""  # keys: ca.crt (claim server), secrets-ca.crt, tls.crt, tls.key; static mode requires executor.replicas=1

database:
  # External managed Postgres wins when url is set (recommended for production).
  external:
    url: ""                # e.g. postgres://user:pw@host:5432/praetor?sslmode=require
  bundled:
    enabled: true
    image: postgres:15
    user: postgres
    password: postgres
    database: praetor
    storage: 8Gi
    storageClass: ""
    resources: {}

nats:
  external:
    url: ""                # e.g. nats://nats.example:4222
  bundled:
    enabled: true
    image: nats:2.10-alpine
    storage: 12Gi          # must exceed maxFileStore (JetStream is a datastore here)
    storageClass: ""
    maxFileStore: "10GB"   # bounds the JetStream file store (run logs + streams)
    resources: {}

# Gitea pack registry (the executor pulls Execution Packs from it). Kept external:
# the in-repo Gitea image is demo-grade. Empty is allowed (executor still boots;
# pack pulls just fail until set).
gitea:
  internalUrl: ""          # e.g. http://gitea.internal:3000
  owner: praetor

hostRunner:
  # URL managed hosts call back to (ingestion). MUST be routable FROM the targets,
  # i.e. the external ingestion address — never a cluster-internal *.svc name.
  # Required for remote runs; validated in NOTES.txt. Defaults to the ingestion
  # ingress host when ingress is enabled and this is left empty.
  callbackUrl: ""

ldap:
  enabled: false
  # Use a pre-existing ConfigMap containing ldap.yaml when a disposable
  # validation fixture owns the directory and its configuration.
  existingConfigMap: ""
  # Provider-neutral authenticator rules and legacy LDAP login mappings, rendered verbatim into
  # /etc/praetor/ldap/ldap.yaml (see deployments/ldap/ldap-config.yaml for a full
  # LDAP example and docs/AUTHENTICATOR_MAPPING.md for ordered all/any/not
  # rules). Leave empty to disable LDAP entirely (local auth only).
  config: {}

api:
  replicas: 1
  resources: {}
  service:
    port: 8080
  podAnnotations: {}
  extraEnv: []

ingestion:
  replicas: 1
  resources: {}
  service:
    port: 8081
  logStoreMaxMB: 5120
  logStoreMaxAgeDays: 0
  podAnnotations: {}
  extraEnv: []

scheduler:
  replicas: 1
  jobRetentionDays: 90     # 0 = keep forever
  reconcileQueuedTimeout: "10m"  # queued-but-never-reported remote run -> handed to the reconciler
  resources: {}
  podAnnotations: {}
  extraEnv: []

consumer:
  replicas: 1
  resources: {}
  podAnnotations: {}
  extraEnv: []

migrator:
  # Must outlive Helm's longest configured --wait timeout so the waiter cannot
  # observe a completed Job disappearing and report a false failed release.
  ttlSecondsAfterFinished: 900
  resources: {}

reconciler:
  # Safe to scale >1: candidates are claimed with FOR UPDATE SKIP LOCKED and leased
  # via reconcile_after, so K replicas never double-harvest the same run. Throughput
  # is replicas × concurrency.
  replicas: 1
  interval: "30s"          # RECONCILE_INTERVAL — hot-sweep cadence
  batch: 10                # RECONCILE_BATCH — candidates claimed per tick per replica
  concurrency: 5           # RECONCILE_CONCURRENCY — parallel harvests per tick
  claimTTL: "3m"           # RECONCILE_CLAIM_TTL — lease length; must exceed one batch wave's harvest time
  coldAfterAttempts: 10    # RECONCILE_COLD_AFTER_ATTEMPTS — consecutive failures before demotion to the cold tier (0 disables)
  coldBackoff: "1h"        # RECONCILE_COLD_BACKOFF — cold-tier (probably-dead host) re-probe cadence
  resources: {}
  podAnnotations: {}
  extraEnv: []

executor:
  # Safe to scale >1: the durable pull consumer is shared and the startup bind is
  # idempotent. Each replica keeps its own WAL/packs/ssh PVCs (StatefulSet).
  replicas: 1
  workers: 2
  ansibleForks: 1
  shmSize: 1Gi
  initImage: busybox:1.36
  persistence:
    jobs:  { size: 5Gi,   storageClass: "" }   # /var/lib/praetor  (localhost-run WAL)
    packs: { size: 10Gi,  storageClass: "" }   # /opt/praetor/packs (extracted packs)
    ssh:   { size: 100Mi, storageClass: "" }   # /home/praetor/.ssh (TOFU known_hosts)
  resources: {}
  podAnnotations: {}
  extraEnv: []

ui:
  replicas: 1
  resources: {}
  service:
    port: 80
  podAnnotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: praetor.example.com          # ui
  apiHost: ""                        # optional dedicated api host; empty → /api path on host
  ingestionHost: ingest.example.com  # host-runner callback endpoint (external!)
  tls:
    enabled: false
    secretName: ""

metrics:
  serviceMonitor:
    enabled: false

networkPolicy:
  enabled: false

# Applied to every pod (pods that must start as root, e.g. executor, override this).
podSecurityContext: {}
