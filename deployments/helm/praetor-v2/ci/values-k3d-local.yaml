# Full working local k3d config (URLs + LDAP + dev secrets), captured from the
# running release so a plain 'helm upgrade -f values-k3d-local.yaml' reproduces
# the URL-based env and never silently drops ingress/LDAP again. Committed so it
# is the single source of truth for the local deploy. Dev-only secrets.
allowInsecureDefaults: false
bootstrapAdmin:
  enabled: true
  password: admin
  username: admin
database:
  bundled:
    storage: 1Gi
executor:
  persistence:
    jobs:
      size: 512Mi
    packs:
      size: 512Mi
    ssh:
      size: 64Mi
  shmSize: 256Mi
gitea:
  internalUrl: http://host.k3d.internal:3002
hostRunner:
  # Host-runner callback. Uses the Docker Desktop host IP (192.168.65.254) so it is
  # reachable from BOTH in-cluster targets (via host.k3d.internal) AND host-based
  # Docker target containers like the RHEL 9 home lab (via host.docker.internal) —
  # both resolve to this same host IP. Requires ingestion exposed on the host at
  # :8081 (kubectl port-forward --address 0.0.0.0 svc/praetor-ingestion 8081:8081).
  # In-cluster-only setups can use http://praetor-ingestion:8081 instead.
  callbackUrl: http://192.168.65.254:8081
image:
  pullPolicy: IfNotPresent
  registry: ""
  tag: dev
ingestion:
  logStoreMaxMB: 128
scheduler:
  # Lab: recover fast. A remote job whose result never reached ingestion is handed
  # to the reconciler after 90s instead of the 10m prod default.
  reconcileQueuedTimeout: "90s"
reconciler:
  # HA: two replicas, safe because candidates are claimed with FOR UPDATE SKIP LOCKED
  # and leased via reconcile_after — the two pods partition each batch, never
  # double-harvest. Throughput is replicas × concurrency. Defaults for the other
  # tunables (batch/concurrency/claimTTL/cold*) come from the chart.
  replicas: 2
ingress:
  className: traefik
  enabled: true
  host: praetor.localhost
  ingestionHost: ingest.praetor.localhost
  tls:
    enabled: true
    secretName: praetor-localhost-tls
ldap:
  config:
    group_type:
      member_attribute: member
      search_base: ou=teams,dc=praetor,dc=local
      search_filter: (objectClass=groupOfNames)
      type: member_dn
    authenticator_maps:
    - name: deny login by default
      order: 0
      revoke: true
      when:
        always: false
      map:
        type: allow
    - name: allow mapped directory groups
      order: 10
      when:
        any:
        - group: cn=platform-team,ou=teams,dc=praetor,dc=local
        - group: cn=backend-team,ou=teams,dc=praetor,dc=local
        - group: cn=frontend-team,ou=teams,dc=praetor,dc=local
        - group: cn=sre-team,ou=teams,dc=praetor,dc=local
        - group: cn=network-team,ou=teams,dc=praetor,dc=local
        - group: cn=admins,ou=teams,dc=praetor,dc=local
        - group: cn=security-team,ou=teams,dc=praetor,dc=local
        - group: cn=compliance-team,ou=teams,dc=praetor,dc=local
        - group: cn=data-engineering-team,ou=teams,dc=praetor,dc=local
        - group: cn=qa-team,ou=teams,dc=praetor,dc=local
      map:
        type: allow
    organization_map:
      Data:
        remove_users: true
        users:
        - cn=data-engineering-team,ou=teams,dc=praetor,dc=local
      Engineering:
        admins:
        - cn=platform-team,ou=teams,dc=praetor,dc=local
        remove_admins: true
        remove_users: true
        users:
        - cn=platform-team,ou=teams,dc=praetor,dc=local
        - cn=backend-team,ou=teams,dc=praetor,dc=local
        - cn=frontend-team,ou=teams,dc=praetor,dc=local
      Operations:
        remove_users: true
        users:
        - cn=sre-team,ou=teams,dc=praetor,dc=local
        - cn=network-team,ou=teams,dc=praetor,dc=local
        - cn=admins,ou=teams,dc=praetor,dc=local
      QualityAssurance:
        remove_users: true
        users:
        - cn=qa-team,ou=teams,dc=praetor,dc=local
      Security:
        auditors:
        - cn=compliance-team,ou=teams,dc=praetor,dc=local
        remove_auditors: true
        remove_users: true
        users:
        - cn=security-team,ou=teams,dc=praetor,dc=local
    server:
      bind_dn: cn=admin,dc=praetor,dc=local
      bind_password_env: PRAETOR_LDAP_BIND_PASSWORD
      insecure_skip_verify: true
      start_tls: false
      timeout: 30s
      url: ldap://ldap:389
    team_map:
      backend-team:
        organization: Engineering
        remove: true
        users:
        - cn=backend-team,ou=teams,dc=praetor,dc=local
      compliance-team:
        organization: Security
        remove: true
        users:
        - cn=compliance-team,ou=teams,dc=praetor,dc=local
      data-engineering-team:
        organization: Data
        remove: true
        users:
        - cn=data-engineering-team,ou=teams,dc=praetor,dc=local
      frontend-team:
        organization: Engineering
        remove: true
        users:
        - cn=frontend-team,ou=teams,dc=praetor,dc=local
      network-team:
        organization: Operations
        remove: true
        users:
        - cn=network-team,ou=teams,dc=praetor,dc=local
      platform-team:
        organization: Engineering
        remove: true
        users:
        - cn=platform-team,ou=teams,dc=praetor,dc=local
      qa-team:
        organization: QualityAssurance
        remove: true
        users:
        - cn=qa-team,ou=teams,dc=praetor,dc=local
      security-team:
        organization: Security
        remove: true
        users:
        - cn=security-team,ou=teams,dc=praetor,dc=local
      sre-team:
        organization: Operations
        remove: true
        users:
        - cn=sre-team,ou=teams,dc=praetor,dc=local
    user_flags_by_group:
      is_superuser:
      - cn=admins,ou=teams,dc=praetor,dc=local
      is_system_auditor:
      - cn=compliance-team,ou=teams,dc=praetor,dc=local
    users:
      attributes:
        email: mail
        first_name: givenName
        last_name: sn
        username: uid
      search_base: ou=users,dc=praetor,dc=local
      search_filter: (objectClass=inetOrgPerson)
      search_scope: sub
  enabled: true
nats:
  bundled:
    maxFileStore: 512MB
    storage: 1Gi
secrets:
  internalToken: dev-internal-token
  jwtSecret: dev-jwt-secret
  ldapBindPassword: admin
  secretKey: 0123456789abcdef0123456789abcdef
