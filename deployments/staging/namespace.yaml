apiVersion: v1
kind: Namespace
metadata:
  name: praetor-staging
  labels:
    app.kubernetes.io/part-of: praetor
    app.kubernetes.io/environment: staging
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: praetor-staging
  namespace: praetor-staging
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "16"
    requests.storage: 100Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: praetor-staging
  namespace: praetor-staging
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 25m
        memory: 64Mi
      default:
        cpu: 500m
        memory: 512Mi
      max:
        cpu: "4"
        memory: 8Gi
