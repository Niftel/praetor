image:
  pullPolicy: IfNotPresent
  pullSecrets:
    - name: praetor-staging-registry

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

secrets:
  existingSecret: praetor-staging-runtime

database:
  bundled:
    image: postgres:15@sha256:74e110c41804365e3915fcc09d5e7a1eff50161aaa94d5da0e58e0cd75ae509c
    storageClass: local-path

nats:
  bundled:
    image: nats:2.10-alpine@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    storageClass: local-path

executor:
  initImage: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
  persistence:
    jobs: { size: 5Gi, storageClass: local-path }
    packs: { size: 10Gi, storageClass: local-path }
    ssh: { size: 100Mi, storageClass: local-path }

hostRunner:
  # Remote pilot runners report through the staging-only load-balancer alias.
  # The pilot network publishes no host port and ingestion still requires the
  # per-run token. Localhost executions can use this route from the executor too.
  callbackUrl: http://ingest.praetor-staging.localhost

ldap:
  enabled: true
  existingConfigMap: praetor-staging-ldap-config

api:
  extraEnv:
    - name: SSL_CERT_FILE
      value: /etc/praetor/ldap/ca.crt
    - name: PRAETOR_NOTIFICATION_ALLOWED_HOSTS
      value: praetor-staging-acceptance-sink,praetor-validation-notification-sink

consumer:
  extraEnv:
    - name: PRAETOR_NOTIFICATION_ALLOWED_HOSTS
      value: praetor-staging-acceptance-sink,praetor-validation-notification-sink

scheduler:
  extraEnv:
    - name: PRAETOR_NOTIFICATION_ALLOWED_HOSTS
      value: praetor-staging-acceptance-sink,praetor-validation-notification-sink

migrator:
  ttlSecondsAfterFinished: 900
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 128Mi

secretsService:
  enabled: true
  url: https://praetor-secrets.praetor-staging.svc:8443
  trustDomain: staging.praetor.local
  apiIdentitySecret: praetor-api-identity
  schedulerIdentitySecret: praetor-scheduler-identity
  executorIdentitySecret: praetor-executor-identity

ingress:
  enabled: true
  className: traefik
  host: praetor-staging.localhost
  ingestionHost: ingest.praetor-staging.localhost
  tls:
    enabled: true
    secretName: praetor-staging-ingress-tls
