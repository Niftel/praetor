# NATS + JetStream configuration for Praetor.
#
# Replaces the inline `-js -sd /data -m 8222` args so JetStream's file store can be
# bounded (issue #27) — there is no CLI flag for the store limits. The bound is a
# server-wide belt; the log object-store bucket has its own tighter per-bucket cap
# (PRAETOR_LOG_STORE_MAX_MB, default 5 GiB), so max_file_store must exceed that
# plus the event streams.

# Client port (services connect to nats:4222 by service name).
port: 4222

# Monitoring endpoint — the compose healthcheck hits /healthz on this port.
http_port: 8222

jetstream {
  store_dir: "/data"
  max_file_store: 10GB
  max_memory_store: 1GB
}
