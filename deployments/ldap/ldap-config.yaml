# Praetor LDAP Configuration — DEMO ONLY.
# Connects to the mock OpenLDAP container in docker-compose. Do NOT copy this file
# to production as-is: the bind password is sourced from an env var (never commit a
# real one here), and insecure_skip_verify must be false against a real directory.

server:
  url: "ldap://ldap:389"
  bind_dn: "cn=admin,dc=praetor,dc=local"
  # Never commit the bind password: read it from this env var (see the API service
  # in docker-compose). The loader (pkg/auth/config.go) requires one of
  # bind_password / bind_password_env.
  bind_password_env: PRAETOR_LDAP_BIND_PASSWORD
  start_tls: false
  # DEMO ONLY: the mock speaks plaintext ldap:// (no TLS), so there is nothing to
  # verify here. Against a real ldaps:// directory this MUST be false.
  insecure_skip_verify: true
  timeout: 30s

users:
  search_base: "ou=users,dc=praetor,dc=local"
  search_filter: "(objectClass=inetOrgPerson)"
  search_scope: "sub"
  attributes:
    username: "uid"
    email: "mail"
    first_name: "givenName"
    last_name: "sn"

organizations:
  enabled: true
  search_base: "ou=organizations,dc=praetor,dc=local"
  search_filter: "(objectClass=organizationalUnit)"
  search_scope: "one"
  attributes:
    name: "ou"
    description: "description"
  member_attribute: "member"

teams:
  enabled: true
  search_base: "ou=teams,dc=praetor,dc=local"
  search_filter: "(objectClass=groupOfNames)"
  search_scope: "sub"
  attributes:
    name: "cn"
    description: "description"
  member_attribute: "member"
  organization_attribute: "ou"

sync:
  interval: "1h"
  create_users: true
  create_orgs: true
  create_teams: true
  remove_stale: false
  dry_run: false
