# Prometheus scrape config for the Praetor stack. Prometheus runs on
# praetor-net, so every service is reachable by its compose service name.
# api/ingestion expose /metrics on their HTTP ports; the loop-only services
# (scheduler/consumer/executor/reconciler/packbuilder) on :2112.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: praetor
    static_configs:
      - targets: ["api:8080"]
        labels: { service: api }
      - targets: ["ingestion:8081"]
        labels: { service: ingestion }
      - targets: ["scheduler:2112"]
        labels: { service: scheduler }
      - targets: ["consumer:2112"]
        labels: { service: consumer }
      - targets: ["executor:2112"]
        labels: { service: executor }
      - targets: ["reconciler:2112"]
        labels: { service: reconciler }
      - targets: ["packbuilder:2112"]
        labels: { service: packbuilder }

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
