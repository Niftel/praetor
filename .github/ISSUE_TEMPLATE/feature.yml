name: Development item
description: A scoped Praetor feature, hardening item, or defect.
title: ""
labels: ["flow:backlog"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: Describe the user-visible or operational result.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: State what is included and explicitly excluded.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use a checklist of observable completion conditions.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Required tests
      description: Name the unit, integration, contract, or end-to-end evidence required.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and RBAC impact
      description: Describe authorization, tenancy, secrets, and audit implications, or write "None".
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Link blockers, parent issues, and follow-up issues, or write "None".
    validations:
      required: true
