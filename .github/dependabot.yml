version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Amsterdam
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Europe/Amsterdam
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Europe/Amsterdam
    groups:
      web-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /docs-site
    schedule:
      interval: weekly
      day: monday
      time: "04:45"
      timezone: Europe/Amsterdam
    groups:
      docs-dependencies:
        patterns: ["*"]
