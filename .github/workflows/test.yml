name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  classify:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      run_go: ${{ steps.plan.outputs.run_go }}
      run_ui: ${{ steps.plan.outputs.run_ui }}
      run_database: ${{ steps.plan.outputs.run_database }}
      run_deployment: ${{ steps.plan.outputs.run_deployment }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Plan affected gates
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REF_TYPE: ${{ github.ref_type }}
        run: ./scripts/github-ci-plan.sh >> "$GITHUB_OUTPUT"

  go:
    needs: classify
    if: needs.classify.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: compatibility manifest
        run: GOWORK=off go run ./cmd/compatcheck
      - name: go vet
        run: GOWORK=off go vet ./...
      - name: build
        run: GOWORK=off go build ./...
      - name: test
        run: GOWORK=off go test ./...

  deployment-contracts:
    needs: classify
    if: needs.classify.outputs.run_deployment == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: wire contracts
        run: GOWORK=off go test ./tests/contracts
      - name: workflow syntax
        run: make workflow-lint
      - name: deployment probe contracts
        run: GOWORK=off make deployment-contract-test

  ui:
    needs: classify
    if: needs.classify.outputs.run_ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: install UI dependencies
        working-directory: web
        run: npm ci
      - name: UI regression tests
        working-directory: web
        run: npm test
      - name: UI production build
        working-directory: web
        run: npm run build:check

  database-compatibility:
    needs: classify
    if: needs.classify.outputs.run_database == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: praetor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/praetor?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
          cache: true
      - name: executable migration compatibility matrix
        run: ./scripts/database-compatibility.sh
      - name: post-upgrade API database smoke tests
        env:
          TEST_DATABASE_URL: ${{ env.DATABASE_URL }}
        run: GOWORK=off go test -count=1 ./services/api/handlers ./services/api/middleware

  # Preserve the established required check name. Individual gates may be
  # skipped by the shared planner, but any selected gate must succeed.
  test:
    if: always()
    needs: [classify, go, deployment-contracts, ui, database-compatibility]
    runs-on: ubuntu-latest
    steps:
      - name: Require every selected gate
        env:
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          GO_RESULT: ${{ needs.go.result }}
          DEPLOYMENT_RESULT: ${{ needs.deployment-contracts.result }}
          UI_RESULT: ${{ needs.ui.result }}
          DATABASE_RESULT: ${{ needs.database-compatibility.result }}
        run: |
          test "$CLASSIFY_RESULT" = success
          for result in "$GO_RESULT" "$DEPLOYMENT_RESULT" "$UI_RESULT" "$DATABASE_RESULT"; do
            case "$result" in
              success|skipped) ;;
              *) echo "selected CI gate finished with $result" >&2; exit 1 ;;
            esac
          done
