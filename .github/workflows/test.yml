name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      # No gofmt gate: this repo's house style is `goimports -local` (external
      # praetordev/* imports first, praetordev/praetor/* internal last), which
      # plain `gofmt -l` reports as "unformatted" by design. vet + build + test
      # are the real gates. go.work is gitignored, so CI resolves the extracted
      # service/lib modules from their published tags via the proxy.
      - name: compatibility manifest
        run: go run ./cmd/compatcheck

      - name: wire contracts
        run: GOWORK=off go test ./tests/contracts

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...
