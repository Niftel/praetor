name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      # No gofmt gate: this repo's house style is `goimports -local` (external
      # praetordev/* imports first, praetordev/praetor/* internal last), which
      # plain `gofmt -l` reports as "unformatted" by design. vet + build + test
      # are the real gates. go.work is gitignored, so CI resolves the extracted
      # service/lib modules from their published tags via the proxy.
      - name: compatibility manifest
        run: go run ./cmd/compatcheck

      - name: wire contracts
        run: GOWORK=off go test ./tests/contracts

      - name: deployment probe contracts
        run: make deployment-contract-test

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

  database-compatibility:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: praetor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/praetor?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true
      - name: executable migration compatibility matrix
        run: ./scripts/database-compatibility.sh
      - name: post-upgrade API database smoke tests
        env:
          TEST_DATABASE_URL: ${{ env.DATABASE_URL }}
        run: go test -count=1 ./services/api/handlers ./services/api/middleware
