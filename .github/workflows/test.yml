name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # No gofmt gate: this repo's house style is `goimports -local` (external
      # praetordev/* imports first, praetordev/praetor/* internal last), which
      # plain `gofmt -l` reports as "unformatted" by design. vet + build + test
      # are the real gates. go.work is gitignored, so CI resolves the extracted
      # service/lib modules from their published tags via the proxy.
      - name: compatibility manifest
        run: go run ./cmd/compatcheck

      - name: wire contracts
        run: GOWORK=off go test ./tests/contracts

      - name: deployment probe contracts
        run: make deployment-contract-test

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...
