name: Image

# Build praetor's own images (api, migrator, ui) and push them to GHCR on merge
# to main and on version tags. PRs build without pushing to catch Dockerfile
# breakage. The Helm chart pulls ghcr.io/niftel/praetor-<name> (see the
# chart's image.registry). The five service images live in their own repos.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Existing release version to rebuild into GHCR (without v prefix)
        required: true
        type: string

concurrency:
  group: image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  artifact-metadata: write
  attestations: write
  contents: read
  id-token: write
  packages: write
  security-events: write

jobs:
  classify:
    name: Classify image inputs
    runs-on: ubuntu-latest
    outputs:
      run_images: ${{ steps.plan.outputs.run_images }}
      image_matrix: ${{ steps.plan.outputs.image_matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Plan affected images
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REF_TYPE: ${{ github.ref_type }}
        run: ./scripts/github-ci-plan.sh >> "$GITHUB_OUTPUT"

  image:
    needs: classify
    if: needs.classify.outputs.run_images == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.classify.outputs.image_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || github.ref }}

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/niftel/praetor-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=scan-${{ github.sha }},enable=${{ github.event_name == 'pull_request' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          load: ${{ github.event_name == 'pull_request' }}
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Verify multi-platform manifest
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ghcr.io/niftel/praetor-${{ matrix.name }}@${{ steps.build.outputs.digest }}
        run: |
          platforms="$(docker buildx imagetools inspect "$IMAGE" --format '{{range .Manifest.Manifests}}{{printf "%s/%s\n" .Platform.OS .Platform.Architecture}}{{end}}')"
          grep -qx 'linux/amd64' <<<"$platforms"
          grep -qx 'linux/arm64' <<<"$platforms"

      - name: Scan image
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ github.event_name == 'pull_request' && format('ghcr.io/niftel/praetor-{0}:scan-{1}', matrix.name, github.sha) || format('ghcr.io/niftel/praetor-{0}@{1}', matrix.name, steps.build.outputs.digest) }}
          fail-build: false
          only-fixed: true
          severity-cutoff: high
          cache-db: true

      - name: Upload vulnerability report
        if: always() && steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: container-${{ matrix.name }}

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ghcr.io/niftel/praetor-${{ matrix.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: true

  image-gate:
    name: image-gate
    if: always()
    needs: [classify, image]
    runs-on: ubuntu-latest
    steps:
      - name: Require every selected image
        env:
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          IMAGE_RESULT: ${{ needs.image.result }}
        run: |
          test "$CLASSIFY_RESULT" = success
          case "$IMAGE_RESULT" in
            success|skipped) ;;
            *) echo "selected image build finished with $IMAGE_RESULT" >&2; exit 1 ;;
          esac
