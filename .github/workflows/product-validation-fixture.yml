name: Product validation fixture

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/product-validation-fixture.yml'
      - 'deployments/product-validation/**'
      - 'deployments/helm/praetor-v2/**'
      - 'scripts/bootstrap-product-validation-base.sh'
      - 'scripts/check-product-validation-fast.sh'
      - 'scripts/classify-product-validation.sh'
      - 'scripts/plan-product-validation.sh'
      - 'scripts/product-validation-fixture.sh'
      - 'scripts/generate-readiness-report.sh'
      - 'scripts/test-secrets-execution-e2e.sh'
      - 'scripts/validate-delegated-api-e2e.sh'
      - 'scripts/validate-ldap-operator-journey.sh'
      - 'scripts/validate-execution-recovery-e2e.sh'
      - 'scripts/validate-dynamic-inventory-e2e.sh'
      - 'scripts/validate-notification-delivery-e2e.sh'
      - 'scripts/validate-fleet-scale-e2e.sh'
      - 'scripts/validate-fleet-scale-live.sh'
      - 'cmd/readiness-report/**'
      - 'internal/readiness/**'
      - 'playbooks/validate-execution-recovery.yml'
      - 'tests/dynamic_inventory_staging_contract_test.go'
      - 'tests/fleet_scale_validation_contract_test.go'
      - 'tests/inventory_sync_history_contract_test.go'
      - 'tests/notification_delivery_staging_contract_test.go'
      - 'services/api/handlers/bulk*.go'
      - 'services/api/handlers/delegated_launch*.go'
      - 'web/components/ui/BulkSelection.tsx'
      - 'web/components/ui/BulkSelection.test.tsx'
      - 'web/pages/FleetScaleJourney.test.tsx'
      - 'web/pages/TemplatesPage.tsx'
      - 'web/services/api.bulk.test.ts'
  workflow_dispatch:
    inputs:
      journey:
        description: Product journey to validate
        required: true
        default: all
        type: choice
        options:
          - all
          - fixture
          - ldap
          - dynamic-inventory
          - execution-recovery
          - notification-delivery
          - secrets
          - delegated-api
          - fleet-scale

permissions:
  contents: read
  packages: read

# A newer commit on the same pull request makes the older disposable cluster
# irrelevant. Cancel it before it can keep consuming a runner for ten minutes.
concurrency:
  group: product-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_cluster: ${{ steps.scope.outputs.run_cluster }}
      run_fixture: ${{ steps.scope.outputs.run_fixture }}
      run_ldap: ${{ steps.scope.outputs.run_ldap }}
      run_dynamic: ${{ steps.scope.outputs.run_dynamic }}
      run_recovery: ${{ steps.scope.outputs.run_recovery }}
      run_notification: ${{ steps.scope.outputs.run_notification }}
      run_secrets: ${{ steps.scope.outputs.run_secrets }}
      run_delegated: ${{ steps.scope.outputs.run_delegated }}
      run_fleet: ${{ steps.scope.outputs.run_fleet }}
      run_readiness: ${{ steps.scope.outputs.run_readiness }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with: {version: v3.18.4}
      - name: Run local-equivalent fast product gates
        run: ./scripts/check-product-validation-fast.sh
      - name: Plan targeted product journeys
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          JOURNEY: ${{ inputs.journey || 'all' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "$EVENT_NAME" == pull_request ]]; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | ./scripts/plan-product-validation.sh >> "$GITHUB_OUTPUT"
          else
            ./scripts/plan-product-validation.sh </dev/null >> "$GITHUB_OUTPUT"
          fi

  lifecycle:
    needs: preflight
    if: needs.preflight.outputs.run_cluster == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: needs.preflight.outputs.run_fleet == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with: {version: v3.18.4}
      - name: Install pinned k3d
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/k3d-io/k3d/releases/download/v5.8.3/k3d-linux-amd64 \
            --output /usr/local/bin/k3d
          chmod 0755 /usr/local/bin/k3d
          test "$(k3d version | awk '/k3d version/ {print $3}')" = v5.8.3
      - name: Authenticate immutable release image pulls
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check out Secrets Service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Niftel/praetor-secrets
          path: praetor-secrets
      - name: Check out Executor
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Niftel/executor
          path: executor
      - name: Create clean cluster and integrated base
        timeout-minutes: 15
        env:
          PRAETOR_SECRETS_ROOT: ${{ github.workspace }}/praetor-secrets
          PRAETOR_EXECUTOR_ROOT: ${{ github.workspace }}/executor
          PRAETOR_VALIDATION_USE_RELEASED_COMPONENTS: "true"
          PRAETOR_K3D_CLUSTER: praetor-validation
        run: |
          k3d cluster create praetor-validation --wait
          ./scripts/bootstrap-product-validation-base.sh
      - name: Create idempotent synthetic fixture
        run: |
          mkdir -p build/readiness-evidence
          ./scripts/product-validation-fixture.sh create
          ./scripts/product-validation-fixture.sh create
      - name: Validate LDAP operator journey
        if: needs.preflight.outputs.run_ldap == 'true'
        env:
          PRAETOR_LDAP_EVIDENCE_FILE: build/readiness-evidence/ldap-operator.json
        run: ./scripts/validate-ldap-operator-journey.sh
      - name: Validate dynamic inventory journey
        if: needs.preflight.outputs.run_dynamic == 'true'
        env:
          PRAETOR_DYNAMIC_INVENTORY_EVIDENCE_FILE: build/readiness-evidence/dynamic-inventory.json
        run: ./scripts/validate-dynamic-inventory-e2e.sh
      - name: Validate execution recovery journey
        if: needs.preflight.outputs.run_recovery == 'true'
        env:
          PRAETOR_EXECUTOR_ROOT: ${{ github.workspace }}/executor
          PRAETOR_RECOVERY_PROJECT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          PRAETOR_RECOVERY_EVIDENCE_FILE: build/readiness-evidence/execution-recovery.json
        run: ./scripts/validate-execution-recovery-e2e.sh
      - name: Validate durable notification delivery journey
        if: needs.preflight.outputs.run_notification == 'true'
        env:
          PRAETOR_NOTIFICATION_EVIDENCE_FILE: build/readiness-evidence/notification-delivery.json
        run: ./scripts/validate-notification-delivery-e2e.sh
      - name: Prove fixture cleanup and recreation
        if: needs.preflight.outputs.run_fixture == 'true'
        run: |
          ./scripts/product-validation-fixture.sh cleanup
          if ./scripts/product-validation-fixture.sh status; then
            echo 'fixture status unexpectedly passed after cleanup' >&2
            exit 1
          fi
          ./scripts/product-validation-fixture.sh create
      - name: Capture live Secrets Service evidence
        if: needs.preflight.outputs.run_secrets == 'true'
        timeout-minutes: 8
        env:
          PRAETOR_E2E_EVIDENCE_FILE: build/readiness-evidence/secrets-service.json
          PRAETOR_E2E_PROJECT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          PRAETOR_E2E_SECRETS_DB_APP: praetor-validation-secrets-postgres
          PRAETOR_E2E_AUDIT_DB_APP: praetor-validation-audit-postgres
        run: |
          executor_pod="$(kubectl get pod -n praetor-secrets -l app.kubernetes.io/component=executor,app.kubernetes.io/instance=praetor -o jsonpath='{.items[0].metadata.name}')"
          executor_arch="$(kubectl exec -n praetor-secrets "$executor_pod" -- uname -m | sed -e 's/^aarch64$/arm64/' -e 's/^x86_64$/amd64/')"
          mkdir -p build/runtime
          kubectl exec -n praetor-secrets "$executor_pod" -- tar -czf "/tmp/ansible-runtime-linux-$executor_arch.tar.gz" -C /opt/praetor/packs ansible-runtime
          kubectl cp "praetor-secrets/$executor_pod:/tmp/ansible-runtime-linux-$executor_arch.tar.gz" "build/runtime/ansible-runtime-linux-$executor_arch.tar.gz"
          ./scripts/test-secrets-execution-e2e.sh
      - name: Capture delegated API evidence
        if: needs.preflight.outputs.run_delegated == 'true'
        timeout-minutes: 5
        run: |
          cleanup() { docker rm -f praetor-readiness-postgres >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run -d --name praetor-readiness-postgres \
            -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=praetor \
            -p 55434:5432 postgres:15 >/dev/null
          POSTGRES_DB=praetor ./scripts/wait-for-postgres.sh praetor-readiness-postgres 60
          DATABASE_URL='postgres://postgres:postgres@localhost:55434/praetor?sslmode=disable' go run ./cmd/migrator >/dev/null
          TEST_DATABASE_URL='postgres://postgres:postgres@localhost:55434/praetor?sslmode=disable' \
            PRAETOR_DELEGATED_EVIDENCE_FILE=build/readiness-evidence/delegated-api.json \
            ./scripts/validate-delegated-api-e2e.sh
      - name: Capture fleet-scale evidence
        if: needs.preflight.outputs.run_fleet == 'true'
        timeout-minutes: 8
        run: |
          npm --prefix web ci
          cleanup() { docker rm -f praetor-fleet-postgres >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run -d --name praetor-fleet-postgres \
            -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=praetor \
            -p 55435:5432 postgres:15 >/dev/null
          POSTGRES_DB=praetor ./scripts/wait-for-postgres.sh praetor-fleet-postgres 60
          DATABASE_URL='postgres://postgres:postgres@localhost:55435/praetor?sslmode=disable' go run ./cmd/migrator >/dev/null
          TEST_DATABASE_URL='postgres://postgres:postgres@localhost:55435/praetor?sslmode=disable' \
            PRAETOR_FLEET_EVIDENCE_FILE=build/readiness-evidence/fleet-scale.json \
            ./scripts/validate-fleet-scale-e2e.sh
          PRAETOR_FLEET_LIVE_EVIDENCE_FILE=build/readiness-evidence/fleet-scale-live.json \
            ./scripts/validate-fleet-scale-live.sh
      - name: Upload bounded journey diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: product-journeys-${{ github.sha }}
          path: build/readiness-evidence/*.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Generate production-candidate decision
        if: needs.preflight.outputs.run_readiness == 'true'
        env:
          PRAETOR_REVISION: ${{ github.sha }}
          PRAETOR_FIXTURE_REVISION: ${{ github.sha }}
          PRAETOR_READINESS_EVIDENCE_DIR: build/readiness-evidence
          PRAETOR_READINESS_REPORT: build/production-candidate-readiness.json
        run: |
          PRAETOR_SECRETS_REVISION="$(git -C "${{ github.workspace }}/praetor-secrets" rev-parse HEAD)" \
            ./scripts/generate-readiness-report.sh
      - name: Upload sanitized readiness evidence
        if: needs.preflight.outputs.run_readiness == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-candidate-readiness-${{ github.sha }}
          path: |
            build/readiness-evidence/*.json
            build/production-candidate-readiness.json
          if-no-files-found: error
          retention-days: 30
      - name: Diagnostics
        if: failure()
        run: |
          kubectl get pods -A -o wide
          kubectl get events -A --sort-by=.lastTimestamp | tail -n 100
          for workload in \
            statefulset/praetor-executor \
            deployment/praetor-scheduler \
            deployment/praetor-api \
            deployment/praetor-consumer; do
            echo "==> $workload"
            kubectl logs -n praetor-secrets "$workload" --all-containers --tail=120 || true
          done

  # Delegated API validation needs PostgreSQL but not Kubernetes. A targeted
  # manual rerun therefore avoids paying the cluster bootstrap cost entirely.
  delegated-api-only:
    needs: preflight
    if: needs.preflight.outputs.run_delegated == 'true' && needs.preflight.outputs.run_cluster != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate delegated API journey
        run: |
          mkdir -p build/readiness-evidence
          cleanup() { docker rm -f praetor-readiness-postgres >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run -d --name praetor-readiness-postgres \
            -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=praetor \
            -p 55434:5432 postgres:15 >/dev/null
          POSTGRES_DB=praetor ./scripts/wait-for-postgres.sh praetor-readiness-postgres 60
          DATABASE_URL='postgres://postgres:postgres@localhost:55434/praetor?sslmode=disable' go run ./cmd/migrator >/dev/null
          TEST_DATABASE_URL='postgres://postgres:postgres@localhost:55434/praetor?sslmode=disable' \
            PRAETOR_DELEGATED_EVIDENCE_FILE=build/readiness-evidence/delegated-api.json \
            ./scripts/validate-delegated-api-e2e.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: delegated-api-${{ github.sha }}
          path: build/readiness-evidence/delegated-api.json
          if-no-files-found: error
          retention-days: 14
