name: Shared module health

on:
  pull_request:
    paths:
      - platform-compatibility.yaml
      - cmd/compatcheck/**
      - scripts/check-workspace-health.sh
      - scripts/release-preflight.sh
      - .github/workflows/shared-module-health.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shared-module-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  released-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate released shared modules
        run: ./scripts/check-workspace-health.sh --modules --remote
