name: Promote platform release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact platformVersion from platform-compatibility.yaml
        required: true
        type: string

concurrency:
  group: platform-release
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: platform-release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Create scoped release token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.PRAETOR_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.PRAETOR_RELEASE_APP_PRIVATE_KEY }}
          owner: Niftel
          repositories: |
            praetor
            scheduler
            reconciler
            executor
            ingestion
            consumer
          permission-contents: write

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote declared component set
        env:
          PRAETOR_RELEASE_TOKEN: ${{ steps.release-token.outputs.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: ./scripts/promote-platform-release.sh "$RELEASE_VERSION"
