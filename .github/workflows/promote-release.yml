name: Promote platform release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact platformVersion from platform-compatibility.yaml
        required: true
        type: string

concurrency:
  group: platform-release
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: platform-release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create scoped release token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.PRAETOR_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.PRAETOR_RELEASE_APP_PRIVATE_KEY }}
          owner: Niftel
          repositories: |
            praetor
            scheduler
            reconciler
            executor
            ingestion
            consumer
          permission-contents: write

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote declared component set
        env:
          PRAETOR_RELEASE_TOKEN: ${{ steps.release-token.outputs.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: ./scripts/promote-platform-release.sh "$RELEASE_VERSION"
