name: Release preflight

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_status:
        description: Release status to verify
        required: true
        default: stable
        type: choice
        options:
          - development
          - stable

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify release manifest
        env:
          REQUESTED_STATUS: ${{ inputs.release_status }}
        run: |
          if [[ "${{ github.event_name }}" == workflow_dispatch && "$REQUESTED_STATUS" == stable ]]; then
            go run ./cmd/compatcheck -release
          else
            summary=$(go run ./cmd/compatcheck -output summary)
            printf '%s\n' "$summary"
            if [[ "${{ github.event_name }}" == workflow_dispatch ]]; then
              [[ "$summary" == *"($REQUESTED_STATUS):"* ]]
            fi
          fi

      - name: Verify release tag matches manifest
        if: github.event_name == 'push'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          manifest_version=$(go run ./cmd/compatcheck -output summary | sed -E 's/^Praetor ([^ ]+).*/\1/')
          test "$RELEASE_TAG" = "v$manifest_version"

      - name: Log in to GHCR for artifact verification
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify stable published artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.release_status == 'stable'
        run: ./scripts/release-preflight.sh --remote

      - name: Verify development published artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.release_status == 'development'
        run: ./scripts/release-preflight.sh --development --remote
