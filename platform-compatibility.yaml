# Compatible component set for the Praetor platform.
#
# This file describes released-dependency/release-image mode. A local go.work or
# Docker Compose sibling build context may override these versions for coordinated
# development, but those overrides do not define a platform release.
schemaVersion: 1
platformVersion: 0.1.1
releaseStatus: development
wireContracts: v1

# The chart uses each component version below through imageTags. image.tag is
# retained as the chart/appVersion fallback and platform release identifier.
image:
  registry: ghcr.io/niftel
  tag: 0.1.1

components:
  api:
    repository: Niftel/praetor
    image: praetor-api
    version: 0.1.1
  migrator:
    repository: Niftel/praetor
    image: praetor-migrator
    version: 0.1.1
  ui:
    repository: Niftel/praetor
    image: praetor-ui
    version: 0.1.1
  scheduler:
    repository: Niftel/scheduler
    module: github.com/praetordev/scheduler
    image: praetor-scheduler
    version: 0.1.2
  reconciler:
    repository: Niftel/reconciler
    module: github.com/praetordev/reconciler
    image: praetor-reconciler
    version: 0.1.0
  executor:
    repository: Niftel/executor
    module: github.com/praetordev/executor
    image: praetor-executor
    version: 0.1.1
  ingestion:
    repository: Niftel/ingestion
    module: github.com/praetordev/ingestion
    image: praetor-ingestion
    version: 0.1.1
  consumer:
    repository: Niftel/consumer
    module: github.com/praetordev/consumer
    image: praetor-consumer
    version: 0.1.1

# Versions here are compatibility commitments and must match this repository's
# go.mod when it imports the module directly.
contracts:
  github.com/praetordev/eventbus: v0.1.0
  github.com/praetordev/events: v0.1.0
  github.com/praetordev/launch: v0.1.1
  github.com/praetordev/models: v0.2.0
  github.com/praetordev/packspec: v0.1.0
  github.com/praetordev/rbac/v4: v4.0.0
  github.com/praetordev/store: v0.1.2

database:
  minimumMigration: 1
  maximumMigration: 67
